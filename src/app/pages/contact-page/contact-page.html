<section class="contact contact-page">
  <span class="section-kicker">{{ language.copy().contactPage.kicker }}</span>
  <h1>{{ language.copy().contactPage.title }}</h1>
  <p class="page-intro">
    {{ language.copy().contactPage.intro }}
  </p>

  <div class="contact-team">
    @for (member of language.copy().contactPage.team; track member.name) {
      <article class="contact-card">
        <span class="role">{{ member.role }}</span>
        <h2>{{ member.name }}</h2>
        <p>{{ member.description }}</p>
      </article>
    }
  </div>

  <form>
    <input type="text" [placeholder]="language.copy().contactPage.form.namePlaceholder">
    <input type="email" [placeholder]="language.copy().contactPage.form.emailPlaceholder">
    <textarea [placeholder]="language.copy().contactPage.form.messagePlaceholder"></textarea>
    <button type="submit">{{ language.copy().contactPage.form.submit }}</button>
  </form>
</section>
