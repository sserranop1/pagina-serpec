<section id="servicios" class="services">
  <h2>{{ language.copy().shared.services.title }}</h2>

  <div class="cards">
    @for (service of language.copy().shared.services.cards; track service.title) {
      <article class="card">
        <h3>{{ service.title }}</h3>
        <p>{{ service.description }}</p>
      </article>
    }
  </div>
</section>
